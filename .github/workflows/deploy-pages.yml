name: Deploy GitHub Pages

# main의 정적 파일을 gh-pages 브랜치로 발행한다.
# gh-pages 브랜치가 처음 푸시되면 GitHub가 Pages를 자동 활성화한다.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
