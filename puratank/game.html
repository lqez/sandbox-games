<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>PURATANK — SD 플라모델 턴제 탱크</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛠</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #9cc8ee;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  .panel {
    position: fixed;
    background: rgba(255, 255, 255, 0.88);
    border: 3px solid #2b3445;
    border-radius: 14px;
    box-shadow: 0 6px 0 rgba(43, 52, 69, 0.35);
    padding: 12px 16px;
    color: #2b3445;
  }
  /* 상단 중앙: 턴 + 계획 breadcrumb + 힌트 */
  #hud {
    top: 10px; left: 50%;
    transform: translateX(-50%);
    padding: 6px 12px 7px;
    pointer-events: none;
    text-align: center;
  }
  #turn-label { font-size: 12px; font-weight: 800; color: #1d4ed8; }
  #env-label { font-size: 12px; font-weight: 700; color: #55607a; margin-left: 6px; }
  #hint { font-size: 11px; font-weight: 600; color: #b0452c; min-height: 13px; max-width: 60vw; }
  /* 계획 breadcrumb: ① 이동 ▸ ② 사격 — 예약/미리보기/빈 슬롯 */
  #crumb-row {
    display: flex; align-items: center; justify-content: center;
    gap: 5px; margin: 4px 0 3px;
  }
  .crumb {
    font-size: 12px; font-weight: 800; color: #2b3445;
    background: #e8ecf3; border: 2px solid #2b3445; border-radius: 8px;
    padding: 3px 9px; white-space: nowrap;
  }
  .crumb.empty { color: #9aa3b5; background: transparent; border-style: dashed; border-color: #9aa3b5; }
  .crumb.pending { color: #2ea04f; border-color: #2ea04f; background: #eaf7ee; }
  .crumb-sep { font-size: 12px; font-weight: 900; color: #8b95a8; }
  .chip {
    pointer-events: auto;
    font-size: 12px; font-weight: 800;
    padding: 4px 10px;
    border-radius: 8px;
    border-width: 2px;
    box-shadow: 0 2px 0 #2b3445;
    margin-left: 3px;
  }
  .chip:active { transform: translateY(2px); box-shadow: 0 0 0 #2b3445; }
  #chip-ow { background: #6b7f5a; }
  #chip-run { background: #2ea04f; }
  #chip-undo { background: #8b95a8; padding: 4px 8px; }
  .chip[hidden] { display: none; }

  /* 탱크 섬네일 (좌: 플레이어 / 우: 적 세로 스택) */
  .thumb {
    position: relative;
    width: 56px; height: 56px;
    background: rgba(255,255,255,0.9);
    border: 2px solid #2b3445;
    border-radius: 9px;
    box-shadow: 0 3px 0 rgba(43,52,69,0.35);
    overflow: hidden;
    cursor: pointer;
    flex-shrink: 0;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb .tag {
    position: absolute; top: 1px; left: 3px;
    font-size: 8px; font-weight: 800; color: #2b3445;
    text-shadow: 0 1px 0 #fff;
  }
  .thumb .lv {
    position: absolute; top: 1px; right: 3px;
    font-size: 8px; font-weight: 800; color: #6b3fa0;
    text-shadow: 0 1px 0 #fff;
  }
  .thumb .hpbar {
    position: absolute; left: 3px; right: 3px; bottom: 3px;
    height: 5px; border: 1px solid #2b3445; border-radius: 3px;
    background: #d5dae3; overflow: hidden;
  }
  .thumb .hpbar i {
    display: block; height: 100%;
    background: linear-gradient(#8de08a, #4caf50);
    transition: width 0.25s ease;
  }
  .thumb.player .hpbar i { background: linear-gradient(#7cc4ff, #2f7ee0); }
  .thumb.dead { filter: grayscale(1) brightness(0.6); }
  /* 안개·폭우 시야 밖: 실루엣만 — 위치·체력 미상 */
  .thumb.hid img { filter: blur(3px) grayscale(1) brightness(0.5); }
  .thumb.hid::after {
    content: '?';
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 900; color: #fff;
    text-shadow: 0 1px 4px #000;
  }
  .thumb.hid .hpbar { visibility: hidden; }
  #thumb-player { position: fixed; top: 10px; left: 10px; z-index: 10; }
  #thumb-enemies {
    position: fixed; top: 10px; right: 10px; z-index: 10;
    display: flex; flex-direction: column; gap: 6px;
  }
  /* 섬네일 확대 상세 */
  #thumb-detail {
    position: fixed; top: 74px; left: 10px; z-index: 12;
    display: none;
    max-width: 280px;
    font-size: 12px; font-weight: 600; line-height: 1.55;
  }
  #thumb-detail.right { left: auto; right: 74px; top: 10px; }
  #thumb-detail.show { display: block; }
  #thumb-detail b { color: #1d4ed8; }

  /* 전술 카드 핸드: 덱 20장 → 5장 드로 → 최대 3장 순서 선택 */
  #hand {
    position: fixed; bottom: 12px; left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: flex-end; gap: 8px;
    z-index: 11;
  }
  #deck-pill {
    width: 40px; height: 56px;
    background: repeating-linear-gradient(135deg, #35507c, #35507c 6px, #2b4066 6px, #2b4066 12px);
    border: 3px solid #2b3445; border-radius: 8px;
    box-shadow: 0 3px 0 rgba(43,52,69,0.4);
    color: #fff; font-size: 12px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    text-shadow: 0 1px 2px #000;
    flex-shrink: 0;
    position: relative; overflow: hidden;
  }
  /* 카드 리필 진행 바 — 3초마다 1장 */
  #refill-bar {
    position: absolute; left: 0; bottom: 0;
    height: 5px; width: 0%;
    background: #8de08a;
    transition: width 0.15s linear;
  }
  .card {
    width: 64px; height: 88px;
    background: #fdfaf3;
    border: 3px solid #2b3445; border-radius: 10px;
    box-shadow: 0 4px 0 rgba(43,52,69,0.4);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px; cursor: pointer; position: relative;
    font-weight: 800; font-size: 12px; color: #2b3445;
    transition: transform 0.12s;
    flex-shrink: 0;
  }
  .card .ico { font-size: 21px; line-height: 1; }
  .card .ico svg { width: 34px; height: 34px; display: block; }
  .card .typ { font-size: 9px; font-weight: 700; color: #8b95a8; }
  .card.move { border-color: #2f7ee0; }
  .card.fire { border-color: #d0342c; }
  .card.guard { border-color: #2e8b57; }
  .card { transform-origin: 50% 100%; transition: transform 0.15s; touch-action: none; }
  /* 선택: 확대 + 들어올림 — 재탭/위로 밀면 사용 */
  .card.sel {
    transform: translateY(-16px) scale(1.18) !important;
    box-shadow: 0 0 0 3px #ffd24d, 0 8px 0 rgba(43,52,69,0.4);
    z-index: 3;
  }
  /* 덱에서 뒤집히며 날아드는 새 카드 */
  @keyframes card-deal {
    0% { opacity: 0; transform: translateX(-64px) rotateY(90deg) scale(0.8); }
    60% { opacity: 1; transform: translateX(-8px) rotateY(-14deg); }
    100% { opacity: 1; }
  }
  .card.deal { animation: card-deal 0.45s ease-out; }
  /* 사용: 카드가 탱크 머리 위로 날아가 사라진다 */
  .card.fly {
    position: fixed; z-index: 30; pointer-events: none; margin: 0;
    transition: left 0.55s ease-in, top 0.55s ease-in, transform 0.55s ease-in, opacity 0.55s ease-in;
  }
  /* 재장전 중인 공격/엄호 카드 — 내면 제자리에서 장전을 기다린다 */
  .card.cool { filter: grayscale(0.65) brightness(0.72); }
  @media (max-width: 640px) {
    #hand { gap: 5px; bottom: 8px; }
    .card { width: 54px; height: 74px; border-width: 2px; }
    .card .ico { font-size: 18px; }
    .card .ico svg { width: 27px; height: 27px; }
    #deck-pill { width: 32px; height: 46px; font-size: 11px; }
    #btn-settings { bottom: 96px; } /* 카드 핸드와 겹치지 않게 */
  }

  /* 확정 바: 계획 미리보기 상태에서만 표시 — 카드 핸드 위에 뜬다 */
  #confirm {
    bottom: 112px; left: 50%;
    transform: translateX(-50%);
    display: none;
    padding: 8px;
  }
  #confirm.show { display: block; }
  #confirm button {
    background: #2ea04f;
    font-size: 17px;
    padding: 12px 34px;
  }
  button {
    font-family: inherit;
    white-space: nowrap;
    font-size: 14px;
    font-weight: 800;
    color: #fff;
    background: #3b82f6;
    border: 3px solid #2b3445;
    border-radius: 10px;
    box-shadow: 0 4px 0 #2b3445;
    padding: 9px 18px;
    cursor: pointer;
    transition: transform 0.05s;
  }
  button:active { transform: translateY(3px); box-shadow: 0 1px 0 #2b3445; }
  button.secondary { background: #8b95a8; }
  button:disabled { background: #b9c0cc; cursor: default; box-shadow: 0 4px 0 #7c8494; }
  button.mode { background: #8b95a8; }
  #btn-move-mode.on { background: #2f7ee0; }
  #btn-fire-mode.on { background: #d0342c; }

  #perf {
    bottom: 16px; left: 12px;
    font-family: 'Consolas', 'Menlo', monospace;
    font-size: 12px;
    font-weight: 700;
    padding: 7px 11px;
    cursor: pointer;
    text-align: right;
    min-width: 74px;
  }
  #perf .row { color: #55607a; margin-top: 2px; display: none; }
  #perf.open .row { display: block; }
  /* 좁은 화면: 축소 */
  @media (max-width: 640px) {
    #perf {
      font-size: 10px; padding: 4px 7px; min-width: 0;
      border-width: 2px; border-radius: 8px;
    }
  }

  /* 구석 ⚙ 설정 버튼 + 다이얼로그 (게임 종료/재시작) */
  #btn-settings {
    position: fixed; bottom: 16px; right: 12px; z-index: 14;
    font-size: 17px; padding: 8px 12px;
    background: #8b95a8;
  }
  #settings {
    position: fixed; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(20, 26, 38, 0.55);
    z-index: 25;
  }
  #settings.show { display: flex; }
  #settings .box {
    background: #fff;
    border: 4px solid #2b3445;
    border-radius: 18px;
    box-shadow: 0 10px 0 rgba(43, 52, 69, 0.5);
    padding: 26px 34px;
    text-align: center;
    display: flex; flex-direction: column; gap: 12px;
    min-width: 230px;
  }
  #settings h3 { font-size: 18px; color: #2b3445; margin-bottom: 4px; }
  #settings .env-info { font-size: 12px; font-weight: 600; color: #55607a; margin-bottom: 2px; }

  #overlay {
    position: fixed; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(20, 26, 38, 0.55);
    z-index: 20;
  }
  #overlay.show { display: flex; }
  #overlay .box {
    background: #fff;
    border: 4px solid #2b3445;
    border-radius: 18px;
    box-shadow: 0 10px 0 rgba(43, 52, 69, 0.5);
    padding: 34px 48px;
    text-align: center;
  }
  #overlay-title { font-size: 34px; margin-bottom: 8px; }
  #overlay-sub { font-size: 14px; color: #55607a; margin-bottom: 20px; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "./vendor/three.module.js"
  }
}
</script>
</head>
<body>
  <div id="app"></div>

  <div id="hud" class="panel">
    <div><span id="turn-label">턴 1</span><span id="env-label"></span></div>
    <div id="crumb-row">
      <span id="crumbs"></span>
      <button id="chip-run" class="chip" hidden>▶ 실행</button>
      <button id="chip-undo" class="chip" hidden>✕</button>
    </div>
    <div id="hint"></div>
  </div>

  <div id="thumb-player" class="thumb player"></div>
  <div id="thumb-enemies"></div>
  <div id="thumb-detail" class="panel"></div>

  <div id="perf" class="panel">
    <div id="perf-fps">-- FPS</div>
    <div class="row" id="perf-ms">-- ms</div>
    <div class="row" id="perf-dc">DC --</div>
    <div class="row" id="perf-tri">TRI --</div>
  </div>

  <div id="confirm" class="panel">
    <button id="btn-ok">✓ 확정</button>
  </div>
  <div id="hand"></div>

  <button id="btn-settings">⚙</button>
  <div id="settings">
    <div class="box">
      <h3>⚙ 설정</h3>
      <div class="env-info" id="settings-env"></div>
      <button id="btn-restart" class="secondary">↻ 다시 시작</button>
      <button id="btn-rules" class="secondary" onclick="location.href='./rules/'">🃏 카드 조합 규칙</button>
      <button id="btn-garage">🏁 게임 종료 — 차고로</button>
      <button id="btn-close-settings" class="secondary">닫기</button>
    </div>
  </div>

  <div id="overlay">
    <div class="box">
      <div id="overlay-title">🏆 승리!</div>
      <div id="overlay-sub">모든 적 탱크를 격파했습니다.</div>
      <button id="btn-again">다시 플레이</button>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
