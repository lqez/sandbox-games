<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>PURATANK — SD 플라모델 턴제 탱크</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛠</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #9cc8ee;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  .panel {
    position: fixed;
    background: rgba(255, 255, 255, 0.88);
    border: 3px solid #2b3445;
    border-radius: 14px;
    box-shadow: 0 6px 0 rgba(43, 52, 69, 0.35);
    padding: 12px 16px;
    color: #2b3445;
  }
  #hud {
    top: 14px; left: 14px;
    min-width: 210px;
    pointer-events: none;
  }
  #hud h1 { font-size: 16px; letter-spacing: 1px; }
  #turn-label { margin-top: 4px; font-size: 14px; font-weight: 700; color: #1d4ed8; }
  #hint { margin-top: 3px; font-size: 12px; font-weight: 600; color: #b0452c; min-height: 15px; }
  #player-hp { margin-top: 6px; font-size: 12px; font-weight: 700; }
  #player-hp .bar {
    margin-top: 3px;
    width: 100%; height: 10px;
    background: #d5dae3;
    border: 2px solid #2b3445;
    border-radius: 6px;
    overflow: hidden;
  }
  #player-hp .fill {
    height: 100%; width: 100%;
    background: linear-gradient(#7cc4ff, #2f7ee0);
    transition: width 0.25s ease;
  }

  #controls {
    bottom: 16px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 10px;
    padding: 10px;
  }
  button {
    font-family: inherit;
    font-size: 14px;
    font-weight: 800;
    color: #fff;
    background: #3b82f6;
    border: 3px solid #2b3445;
    border-radius: 10px;
    box-shadow: 0 4px 0 #2b3445;
    padding: 9px 18px;
    cursor: pointer;
    transition: transform 0.05s;
  }
  button:active { transform: translateY(3px); box-shadow: 0 1px 0 #2b3445; }
  button.secondary { background: #8b95a8; }
  button:disabled { background: #b9c0cc; cursor: default; box-shadow: 0 4px 0 #7c8494; }
  button.mode { background: #8b95a8; }
  #btn-move-mode.on { background: #2f7ee0; }
  #btn-fire-mode.on { background: #d0342c; }

  #perf {
    top: 14px; right: 14px;
    font-family: 'Consolas', 'Menlo', monospace;
    font-size: 12px;
    font-weight: 700;
    padding: 7px 11px;
    cursor: pointer;
    text-align: right;
    min-width: 74px;
  }
  #perf .row { color: #55607a; margin-top: 2px; display: none; }
  #perf.open .row { display: block; }

  #overlay {
    position: fixed; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(20, 26, 38, 0.55);
    z-index: 20;
  }
  #overlay.show { display: flex; }
  #overlay .box {
    background: #fff;
    border: 4px solid #2b3445;
    border-radius: 18px;
    box-shadow: 0 10px 0 rgba(43, 52, 69, 0.5);
    padding: 34px 48px;
    text-align: center;
  }
  #overlay-title { font-size: 34px; margin-bottom: 8px; }
  #overlay-sub { font-size: 14px; color: #55607a; margin-bottom: 20px; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "./vendor/three.module.js"
  }
}
</script>
</head>
<body>
  <div id="app"></div>

  <div id="hud" class="panel">
    <h1>🛠 PURATANK</h1>
    <div id="turn-label">턴 1</div>
    <div id="hint"></div>
    <div id="player-hp">
      HP <span id="player-hp-num">140 / 140</span>
      <div class="bar"><div class="fill" id="player-hp-fill"></div></div>
      <div id="level-label" style="margin-top:5px; font-weight:600; color:#55607a;"></div>
    </div>
  </div>

  <div id="perf" class="panel">
    <div id="perf-fps">-- FPS</div>
    <div class="row" id="perf-ms">-- ms</div>
    <div class="row" id="perf-dc">DC --</div>
    <div class="row" id="perf-tri">TRI --</div>
  </div>

  <div id="controls" class="panel">
    <button id="btn-move-mode" class="mode on">🚚 이동</button>
    <button id="btn-fire-mode" class="mode">🎯 포격</button>
    <button id="btn-wait" class="secondary">⏸ 대기</button>
    <button id="btn-restart" class="secondary">↻</button>
    <button id="btn-garage" class="secondary">🛠</button>
  </div>

  <div id="overlay">
    <div class="box">
      <div id="overlay-title">🏆 승리!</div>
      <div id="overlay-sub">모든 적 탱크를 격파했습니다.</div>
      <button id="btn-again">다시 플레이</button>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
